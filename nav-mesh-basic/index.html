<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
        <script src="/js/aframe-locomotion.umd.min.js"></script>
        <script src="./script.js"></script>
        <meta title="">
    </head>
    <body>
        <a-scene background="color: #53d4cf" nav-mesh-strategy script>
            <!-- Environment  -->
            <a-entity gltf-model="url(../assets/DemoWorld.glb)" position="-0.5 -1 -4.5" nav-mesh></a-entity>
            <a-entity id="sharks" gltf-model="url(../assets/Sharks.glb)" position="-3.0 0 -15.5" circle></a-entity>
            <a-entity id="ship" gltf-model="url(../assets/ShipCenter.glb)" position="23.1 -1.3 -20" rotation="0 55 0" buoyant take-control></a-entity>
            <a-entity light="type: directional; color: #FFF; intensity: 1.2" position="0.5 1 1"></a-entity>
            <a-entity light="type: directional; color: #CCC; intensity: 1.0" position="-0.5 1 0.5"></a-entity>
            <a-entity light="type: ambient; color: #FFF; intensity: 1.0"></a-entity>
            <a-entity geometry="primitive: plane; width: 500; height: 500" position="0 0 0" rotation="-90 0 0" material="shader: flat; color: #49ffff; opacity: 0.85" wave></a-entity>

            <!-- Camera rig -->
            <a-entity id="rig" position="0 0 0" gravity>
                <a-entity id="camera" camera position="0 1.6 0" wasd-controls look-controls nav-mesh-constrained="offset: 0 1.6 0">
                    <al-snap-turn-fade rotation-source="#rig"></al-snap-turn-fade>
                    <al-vignette motion-source="#rig"></al-vignette>
                </a-entity>

                <!-- Hands -->
                <a-entity id="leftHand"
                    vive-controls="hand: left"
                    oculus-touch-controls="hand: left"
                    microsoft-motion-controls="hand: left"
                    daydream-controls="left" gearvr-controls="left" smooth-locomotion="target: #rig; reference: #camera; moveSpeed: 2">
                </a-entity>
                <a-entity id="rightHand"
                    vive-controls="hand: right"
                    microsoft-motion-controls="hand: right"
                    oculus-touch-controls="hand: right"
                    daydream-controls="right" gearvr-controls="right" snap-turn="target: #rig; reference: #camera; delay: 0.1">
                </a-entity>

            </a-entity>
        </a-scene>
    </body>
</html>
